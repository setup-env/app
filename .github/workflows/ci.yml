name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Validate catalog and reference manifest
        run: |
          go run ./cmd/setup-env module validate-catalog
          go run ./cmd/setup-env module validate examples/setup-env.yaml

      - name: Smoke test status output
        shell: pwsh
        run: |
          go run ./cmd/setup-env status
          $statusPath = Join-Path $env:RUNNER_TEMP "setup-env-status.json"
          go run ./cmd/setup-env status --json | Out-File -Encoding utf8 $statusPath
          $status = Get-Content -Raw $statusPath | ConvertFrom-Json
          if ($status.schema_version -ne 1) {
            throw "unexpected status schema version"
          }
          if (-not $status.timestamp -or -not $status.diagnostics.health) {
            throw "status JSON is missing required structural fields"
          }

      - name: Build
        run: go build ./cmd/setup-env

  race:
    name: Race test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test with race detector
        run: go test -race ./...
