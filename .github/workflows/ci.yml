name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test PowerShell installer functions
        shell: pwsh
        run: ./tests/install.ps1.tests.ps1

      - name: Test POSIX installer functions
        if: runner.os != 'Windows'
        shell: bash
        run: sh tests/install.sh.tests.sh

      - name: Validate catalog and reference manifest
        run: |
          go run ./cmd/setup-env module validate-catalog
          go run ./cmd/setup-env module validate examples/setup-env.yaml

      - name: Smoke test status output
        shell: pwsh
        run: |
          go run ./cmd/setup-env status
          $statusPath = Join-Path $env:RUNNER_TEMP "setup-env-status.json"
          go run ./cmd/setup-env status --json | Out-File -Encoding utf8 $statusPath
          $status = Get-Content -Raw $statusPath | ConvertFrom-Json
          if ($status.schema_version -ne 1) {
            throw "unexpected status schema version"
          }
          if (-not $status.timestamp -or -not $status.diagnostics.health) {
            throw "status JSON is missing required structural fields"
          }
          $defaultPath = Join-Path $env:RUNNER_TEMP "setup-env-default.txt"
          go run ./cmd/setup-env | Out-File -Encoding utf8 $defaultPath
          $defaultOutput = Get-Content -Raw $defaultPath
          if (-not $defaultOutput.Contains("SETUP ENV SYSTEM STATUS")) {
            throw "redirected no-argument execution did not use static status"
          }
          if ($defaultOutput.Contains([char]27)) {
            throw "redirected no-argument output contains ANSI escapes"
          }
          $nativeErrorPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          $dashboardOutput = & go run ./cmd/setup-env dashboard 2>&1
          $dashboardExitCode = $LASTEXITCODE
          $PSNativeCommandUseErrorActionPreference = $nativeErrorPreference
          $dashboardText = $dashboardOutput | Out-String
          if ($dashboardExitCode -eq 0) {
            throw "explicit dashboard unexpectedly succeeded without a TTY"
          }
          if (-not $dashboardText.Contains("requires an interactive input and output terminal")) {
            throw "explicit dashboard non-TTY error was not actionable"
          }
          $global:LASTEXITCODE = 0

      - name: Build
        run: go build ./cmd/setup-env

  cross-build:
    name: Cross-build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
          - goos: windows
            goarch: arm64
            suffix: .exe
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cross-build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o "${{ runner.temp }}/setup-env-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}" ./cmd/setup-env

  race:
    name: Race test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test with race detector
        run: go test -race ./...

  release-snapshot:
    name: Release snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build and verify candidate artifacts
        run: go run ./cmd/release -version v0.1.0 -dirty=false -output dist

      - name: Verify complete artifact matrix
        shell: pwsh
        run: |
          $expected = @(
            "checksums.txt",
            "setup-env_0.1.0_windows_amd64.zip",
            "setup-env_0.1.0_windows_arm64.zip",
            "setup-env_0.1.0_darwin_amd64.tar.gz",
            "setup-env_0.1.0_darwin_arm64.tar.gz",
            "setup-env_0.1.0_linux_amd64.tar.gz",
            "setup-env_0.1.0_linux_arm64.tar.gz"
          ) | Sort-Object
          $actual = Get-ChildItem dist -File | Select-Object -ExpandProperty Name | Sort-Object
          if (Compare-Object $expected $actual) {
            throw "release artifact matrix is incomplete or contains unexpected files"
          }

      - name: Verify injected metadata
        run: |
          mkdir metadata-check
          tar -xzf dist/setup-env_0.1.0_linux_amd64.tar.gz -C metadata-check
          metadata-check/setup-env version | grep 'setup-env v0.1.0'
          metadata-check/setup-env version | grep "${GITHUB_SHA}"
          metadata-check/setup-env version | grep 'dirty false'

      - name: Verify reproducible Linux archive
        run: |
          go run ./cmd/release -version v0.1.0 -dirty=false -targets linux/amd64 -output dist-repeat
          test "$(sha256sum dist/setup-env_0.1.0_linux_amd64.tar.gz | cut -d' ' -f1)" = \
            "$(sha256sum dist-repeat/setup-env_0.1.0_linux_amd64.tar.gz | cut -d' ' -f1)"

  installer-integration:
    name: Installer integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux/amd64
            installer: shell
          - os: macos-latest
            target: darwin/arm64
            installer: shell
          - os: windows-latest
            target: windows/amd64
            installer: powershell
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build local installer fixture
        run: |
          go run ./cmd/release -version v0.1.0 -dirty=false -targets ${{ matrix.target }} -output dist
          go run ./cmd/release -version v0.1.1 -dirty=false -targets ${{ matrix.target }} -output dist-upgrade

      - name: Exercise PowerShell installer
        if: matrix.installer == 'powershell'
        shell: pwsh
        run: |
          ./tests/install.ps1.integration.ps1 `
            -ReleaseDir dist `
            -Version v0.1.0 `
            -UpgradeReleaseDir dist-upgrade `
            -UpgradeVersion v0.1.1

      - name: Exercise POSIX installer
        if: matrix.installer == 'shell'
        shell: bash
        run: sh tests/install.sh.integration.sh dist v0.1.0 dist-upgrade v0.1.1
